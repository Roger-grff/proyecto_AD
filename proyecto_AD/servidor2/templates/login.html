{% extends "base.html" %}
{% block title %}Iniciar sesión · EPN{% endblock %}

{% block css %}
<style>
  .login-box { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 1px 2px rgba(24,34,51,.05); padding: 2.6rem 2.2rem; width: 100%; max-width: 400px; margin: 5rem auto 0; }
  .login-top { text-align: center; margin-bottom: 1.9rem; }
  .login-top .seal { margin: 0 auto .8rem; }
  .login-top h1 { font-size: 1.35rem; color: var(--ink); margin-bottom: .25rem; }
  .login-top p { color: var(--slate); font-size: .8rem; }
  .btn-block { width: 100%; justify-content: center; padding: .68rem; font-size: .92rem; margin-top: .3rem; }
  .hint { background: var(--paper); border: 1px solid var(--line); border-radius: 7px; padding: .75rem .95rem; margin-top: 1.4rem; font-size: .76rem; color: var(--ink-soft); }
  .hint strong { display: block; margin-bottom: .3rem; color: var(--ink); font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; }
  .hint code { background: var(--surface); border: 1px solid var(--line); padding: 1px 6px; border-radius: 4px; font-size: .85em; }
  .login-nodo { text-align: center; margin-top: 1.1rem; color: var(--slate); font-size: .7rem; font-family: 'IBM Plex Mono', monospace; }

  .password-wrap { position: relative; }
  .password-wrap .input { padding-right: 2.7rem; }
  .toggle-pass {
    position: absolute; right: .5rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; padding: .35rem; cursor: pointer;
    color: var(--slate); display: flex; align-items: center; border-radius: 5px;
  }
  .toggle-pass:hover { color: var(--ink); background: var(--paper); }
  .toggle-pass:focus-visible { outline: 2px solid var(--brass); outline-offset: 1px; }
</style>
{% endblock %}

{% block body %}

<div class="login-box">
  <div class="login-top">
<span class="seal xl"
      style="margin:0 auto .9rem;font-family:'Fraunces',serif;font-weight:600;">
    EPN
</span>
    <h1>Iniciar sesión</h1>
    <p>Sistema de entrega de tareas</p>
  </div>

  <form method="POST">
    <div class="campo">
      <label>Cédula</label>
      <input type="text" name="cedula" class="input" placeholder="Ej: 1700000001"
              maxlength="10" inputmode="numeric" pattern="[0-9]*"
              autofocus required>
    </div>
    <div class="campo">
      <label>Contraseña</label>
      <div class="password-wrap">
        <input type="password" name="password" id="password" class="input"
                placeholder="********" maxlength="120" required>
        <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar contraseña">
          <svg id="iconEyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="iconEyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="display:none">
            <path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-11-7-11-7a21.27 21.27 0 015.06-6.06M9.9 4.24A10.94 10.94 0 0112 4c7 0 11 7 11 7a21.27 21.27 0 01-3.22 4.36M1 1l22 22"/>
          </svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
  </form>

  <div class="hint">
    <strong>Credenciales de prueba</strong>
    Cédula: <code>1700000001</code> &nbsp; Contraseña: <code>pass123</code>
  </div>
  <div class="login-nodo">NODO ACTIVO · {{ nodo }}</div>
</div>

<script>
(function () {
  var btn = document.getElementById('togglePass');
  var inp = document.getElementById('password');
  var eyeOpen = document.getElementById('iconEyeOpen');
  var eyeOff = document.getElementById('iconEyeOff');
  btn.addEventListener('click', function () {
    var show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    eyeOpen.style.display = show ? 'none' : '';
    eyeOff.style.display = show ? '' : 'none';
    btn.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña');
  });
})();
</script>
{% endblock %}
