{% extends "base.html" %}
{% block title %}Iniciar sesión · EPN{% endblock %}

{% block css %}
<style>
  .wrap { display: flex; justify-content: center; padding-top: 5rem; }
  .login-box { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 1px 2px rgba(24,34,51,.05); padding: 2.6rem 2.2rem; width: 100%; max-width: 400px; }
  .login-top { text-align: center; margin-bottom: 1.9rem; }
  .login-top .seal { margin: 0 auto .8rem; }
  .login-top h1 { font-size: 1.35rem; color: var(--ink); margin-bottom: .25rem; }
  .login-top p { color: var(--slate); font-size: .8rem; }
  .btn-block { width: 100%; justify-content: center; padding: .68rem; font-size: .92rem; margin-top: .3rem; }
  .hint { background: var(--paper); border: 1px solid var(--line); border-radius: 7px; padding: .75rem .95rem; margin-top: 1.4rem; font-size: .76rem; color: var(--ink-soft); }
  .hint strong { display: block; margin-bottom: .3rem; color: var(--ink); font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; }
  .hint code { background: var(--surface); border: 1px solid var(--line); padding: 1px 6px; border-radius: 4px; font-size: .85em; }
  .login-nodo { text-align: center; margin-top: 1.1rem; color: var(--slate); font-size: .7rem; font-family: 'IBM Plex Mono', monospace; }
</style>
{% endblock %}

{% block body %}
<div class="login-box">
  <div class="login-top">
<span class="seal xl"
      style="margin:0 auto .9rem;font-family:'Fraunces',serif;font-weight:600;">
    EPN
</span>
    <h1>Iniciar sesión</h1>
    <p>Sistema de entrega de tareas</p>
  </div>

  <form method="POST">
    <div class="campo">
      <label>Cédula</label>
      <input type="text" name="cedula" class="input" placeholder="Ej: 1700000001" autofocus required>
    </div>
    <div class="campo">
      <label>Contraseña</label>
      <input type="password" name="password" class="input" placeholder="********" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
  </form>

  <div class="hint">
    <strong>Credenciales de prueba</strong>
    Cédula: <code>1700000001</code> &nbsp; Contraseña: <code>pass123</code>
  </div>
  <div class="login-nodo">NODO ACTIVO · {{ nodo }}</div>
</div>
{% endblock %}
